<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paga Eu Portable V3.12</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="qrcode.min.js"></script>
    <script src="html5-qrcode"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-xl w-full bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 overflow-hidden">
        <div class="bg-slate-50 p-6 border-b flex justify-between items-center">
            <h1 class="text-xl font-black text-[#002e8a] italic flex items-center gap-2 uppercase">
                <span class="text-2xl">📱</span> Paga Eu
            </h1>
            <select id="langSelect" onchange="changeLang()" class="bg-white border p-2 rounded-lg text-[10px] font-bold uppercase outline-none">
                <option value="pt">PT</option>
                <option value="ln">LN</option>
                <option value="fr">FR</option>
                <option value="es">ES</option>
            </select>
        </div>

        <div class="flex p-2 gap-1 bg-slate-100/50">
            <button onclick="showTab('gen')" id="btn-gen" class="tab-btn flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all bg-white text-[#002e8a] shadow-sm">Gerar</button>
            <button onclick="showTab('pay')" id="btn-pay" class="tab-btn flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-slate-400">Pagar</button>
            <button onclick="showTab('vault')" id="btn-vault" class="tab-btn flex-1 py-3 rounded-xl text-[10px] font-black uppercase transition-all text-slate-400">Cofre</button>
        </div>

        <div class="p-8 min-h-[520px]">
            
            <section id="tab-gen" class="space-y-4">
                <div class="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                    <button onclick="setKeyType('cpf')" class="key-type-btn px-3 py-2 rounded-lg text-[9px] font-black uppercase border-2 border-[#002e8a] bg-[#002e8a] text-white" id="kt-cpf">CPF</button>
                    <button onclick="setKeyType('tel')" class="key-type-btn px-3 py-2 rounded-lg text-[9px] font-black uppercase border-2 border-slate-100 text-slate-400" id="kt-tel">TEL</button>
                    <button onclick="setKeyType('email')" class="key-type-btn px-3 py-2 rounded-lg text-[9px] font-black uppercase border-2 border-slate-100 text-slate-400" id="kt-email">EMAIL</button>
                </div>
                
                <input type="text" id="inputKey" placeholder="Chave Pix" class="w-full p-4 rounded-xl border-2 font-bold focus:border-[#002e8a] outline-none">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="text" id="inputAmount" placeholder="R$ 0,00" class="p-4 rounded-xl border-2 font-bold focus:border-[#002e8a] outline-none">
                    <input type="text" id="inputID" placeholder="TXID" class="p-4 rounded-xl border-2 font-bold focus:border-[#002e8a] outline-none">
                </div>
                
                <input type="text" id="inputName" placeholder="NOME DO RECEBEDOR" class="w-full p-4 rounded-xl border-2 font-bold uppercase focus:border-[#002e8a] outline-none">
                
                <button onclick="handleGenerate()" class="w-full bg-[#002e8a] text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all">GERAR QR CODE</button>
                
                <div id="qrResult" class="hidden mt-6 flex flex-col items-center p-6 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
                    <div id="qrcode" class="p-2 bg-white rounded-xl shadow-sm"></div>
                    <button onclick="saveCurrentToVault()" class="mt-4 w-full bg-[#166534] text-white font-black py-3 rounded-xl text-[10px] flex items-center justify-center gap-2">💾 GUARDAR NO COFRE</button>
                </div>
            </section>

            <section id="tab-pay" class="hidden text-center space-y-6">
                <div id="scanner-init" class="py-20 flex flex-col items-center space-y-6">
                    <div class="w-24 h-24 bg-slate-100 rounded-full flex justify-center items-center text-slate-300">📷</div>
                    <button onclick="startScanner()" class="bg-[#002e8a] text-white font-black px-10 py-5 rounded-2xl shadow-xl active:scale-95 transition-all">ATIVAR SCANNER</button>
                </div>
                <div id="reader-container" class="hidden relative">
                    <div id="reader" class="rounded-3xl overflow-hidden border-4 border-[#002e8a] bg-black aspect-square"></div>
                    <button onclick="stopScanner()" class="mt-4 text-xs font-bold text-red-600 uppercase">Cancelar</button>
                </div>
            </section>

            <section id="tab-vault" class="hidden space-y-6">
                <div class="bg-[#b91c1c] text-white p-6 rounded-[2rem] shadow-xl flex justify-between items-center">
                    <div>
                        <p class="text-[10px] uppercase font-black opacity-70">Total Devido</p>
                        <h4 id="totalDisplay" class="text-3xl font-black">R$ 0,00</h4>
                    </div>
                    <span class="text-2xl opacity-30">💰</span>
                </div>
                <div id="debtList" class="space-y-3 max-h-[350px] overflow-y-auto pr-2 custom-scrollbar text-xs font-bold text-slate-400 italic text-center">
                    Nenhum débito no cofre.
                </div>
                <button onclick="clearVault()" class="w-full text-[9px] font-black text-slate-300 uppercase hover:text-red-500 transition-colors">Limpar Tudo</button>
            </section>

        </div>

        <div class="p-6 bg-slate-50 text-center border-t">
            <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Soberania Offline • Zorin OS Optimized</p>
        </div>
    </div>

    <script>
        // --- MOTOR PIX ---
        const PixEngine = {
            crc16: (data) => {
                let crc = 0xFFFF;
                for (let i = 0; i < data.length; i++) {
                    crc ^= data.charCodeAt(i) << 8;
                    for (let j = 0; j < 8; j++) crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : (crc << 1);
                }
                return (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
            },
            fEMV: (id, v) => id + String(v).length.toString().padStart(2, '0') + v,
            generate: (key, amount, name, id) => {
                const txid = id.trim().toUpperCase().replace(/[^A-Z0-9]/g, "") || "***";
                const cleanKey = key.replace(/[.\-() ]/g, '');
                const me = PixEngine.fEMV("26", PixEngine.fEMV("00", "br.gov.bcb.pix") + PixEngine.fEMV("01", cleanKey));
                const ad = PixEngine.fEMV("62", PixEngine.fEMV("05", txid));
                let p = "000201" + me + "520400005303986" + PixEngine.fEMV("54", parseFloat(amount).toFixed(2)) + "5802BR" + PixEngine.fEMV("59", name.substring(0, 25)) + "6009SAO PAULO" + ad + "6304";
                return p + PixEngine.crc16(p);
            },
            decode: (payload) => {
                let i = 0; let data = {};
                try {
                    while (i < payload.length - 4) {
                        let tag = payload.substring(i, i + 2);
                        let len = parseInt(payload.substring(i + 2, i + 4), 10);
                        let val = payload.substring(i + 4, i + 4 + len);
                        data[tag] = val; i += 4 + len;
                    }
                    return { valor: data['54'] ? parseFloat(data['54']).toFixed(2).replace('.', ',') : "0,00", nome: data['59'] || "RECEBEDOR", payload };
                } catch { return null; }
            }
        };

        // --- ESTADO GLOBAL ---
        let currentKeyType = 'cpf';
        let savedDebts = JSON.parse(localStorage.getItem('paga_eu_vault_v312')) || [];
        let html5QrCode = null;
        let lastGenerated = null;

        // --- MÁSCARAS ---
        const masks = {
            cpf: (v) => v.replace(/\D/g, '').substring(0, 11).replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2"),
            tel: (v) => v.replace(/\D/g, '').substring(0, 11).replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d)(\d{4})$/, "$1-$2"),
            amount: (v) => {
                let val = v.replace(/\D/g, '');
                val = (Number(val) / 100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3}),/g, "$1.$2,");
                return val ? "R$ " + val : "";
            }
        };

        // --- EVENTOS ---
        document.getElementById('inputKey').addEventListener('input', (e) => {
            if (currentKeyType === 'cpf' || currentKeyType === 'tel') e.target.value = masks[currentKeyType](e.target.value);
        });
        document.getElementById('inputAmount').addEventListener('input', (e) => e.target.value = masks.amount(e.target.value));

        function setKeyType(type) {
            currentKeyType = type;
            document.querySelectorAll('.key-type-btn').forEach(b => b.classList.replace('bg-[#002e8a]', 'bg-white'));
            document.querySelectorAll('.key-type-btn').forEach(b => b.classList.replace('text-white', 'text-slate-400'));
            document.getElementById('kt-'+type).classList.add('bg-[#002e8a]', 'text-white');
            document.getElementById('inputKey').value = "";
        }

        function handleGenerate() {
            const key = document.getElementById('inputKey').value;
            const amount = document.getElementById('inputAmount').value.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
            const name = document.getElementById('inputName').value || "RECEBEDOR";
            const id = document.getElementById('inputID').value;
            
            const payload = PixEngine.generate(key, amount, name, id);
            lastGenerated = { nome: name, valor: document.getElementById('inputAmount').value, payload };
            
            document.getElementById('qrResult').classList.remove('hidden');
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: payload, width: 160, height: 160, colorDark: "#002e8a" });
        }

        function saveCurrentToVault() {
            saveToVault(lastGenerated);
            document.getElementById('qrResult').classList.add('hidden');
            alert("Salvo no Cofre!");
        }

        function saveToVault(data) {
            const debt = { ...data, date: new Date().toLocaleString(), id: Date.now() };
            savedDebts.unshift(debt);
            localStorage.setItem('paga_eu_vault_v312', JSON.stringify(savedDebts));
            updateVaultUI();
        }

        function updateVaultUI() {
            const list = document.getElementById('debtList');
            const total = document.getElementById('totalDisplay');
            list.innerHTML = "";
            
            let sum = 0;
            savedDebts.forEach(d => {
                sum += parseFloat(d.valor.replace("R$ ", "").replace(/\./g, "").replace(",", "."));
                list.innerHTML += `
                    <div class="p-4 bg-slate-50 border rounded-2xl flex justify-between items-center text-left not-italic">
                        <div><p class="text-xs font-black uppercase text-slate-800">${d.nome}</p><p class="text-[8px] text-slate-400 font-bold">${d.date}</p></div>
                        <div class="flex items-center gap-3"><p class="font-black text-[#b91c1c] text-sm">${d.valor}</p>
                        <button onclick="copyPayload('${d.payload}')" class="p-2 bg-white border rounded-lg text-[#002e8a] shadow-sm">📋</button></div>
                    </div>`;
            });
            total.innerText = "R$ " + sum.toFixed(2).replace(".", ",");
        }

        function copyPayload(p) { navigator.clipboard.writeText(p); alert("Copiado!"); }

        function clearVault() { 
            if(confirm("Limpar cofre?")) { 
                savedDebts = []; localStorage.removeItem('paga_eu_vault_v312'); updateVaultUI(); 
            } 
        }

        // --- SCANNER ---
        async function startScanner() {
            document.getElementById('scanner-init').classList.add('hidden');
            document.getElementById('reader-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            try {
                await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
                    const decoded = PixEngine.decode(text);
                    if (decoded) {
                        saveToVault({ nome: decoded.nome, valor: "R$ " + decoded.valor, payload: text });
                        stopScanner();
                        showTab('vault');
                    }
                });
            } catch (e) { alert("Câmera bloqueada ou sem HTTPS."); stopScanner(); }
        }

        function stopScanner() {
            if(html5QrCode) html5QrCode.stop().then(() => {
                document.getElementById('scanner-init').classList.remove('hidden');
                document.getElementById('reader-container').classList.add('hidden');
            });
        }

        // --- NAVEGAÇÃO ---
        function showTab(tab) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('bg-white', 'text-slate-400'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('text-[#002e8a]', 'shadow-sm', 'bg-white'));
            document.getElementById('btn-' + tab).classList.add('bg-white', 'text-[#002e8a]', 'shadow-sm');
            if(tab !== 'pay') stopScanner();
        }

        updateVaultUI();
    </script>
</body>
</html>
