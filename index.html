<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paga Eu - V3.3 (Resiliência Total)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="qrcode.min.js"></script>
    <style>
        :root { --primary: #002e8a; --bg: #f8fafc; --text: #0f172a; --muted: #475569; --white: #ffffff; --focus: #2563eb; --success: #166534; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        input:focus, button:focus, select:focus { outline: 3px solid var(--focus); outline-offset: 3px; }
        .container { background: var(--white); width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); border: 1px solid #e2e8f0; overflow: hidden; }
        .lang-bar { background: #f1f5f9; padding: 10px 15px; display: flex; justify-content: flex-end; border-bottom: 2px solid #e2e8f0; }
        #lang-select { border: 1px solid #cbd5e1; background: var(--white); font-size: 12px; font-weight: 700; padding: 4px; border-radius: 4px; }
        .tabs { display: flex; background: #f1f5f9; padding: 6px; gap: 4px; }
        .tab-btn { flex: 1; padding: 14px; border: 2px solid transparent; background: none; font-size: 11px; font-weight: 800; cursor: pointer; color: var(--muted); border-radius: 10px; text-transform: uppercase; }
        .tab-btn.active { background: var(--white); color: var(--primary); border-color: var(--primary); }
        .content { padding: 30px; display: none; }
        .content.active { display: block; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--primary); font-size: 24px; font-weight: 800; }
        header p { color: var(--muted); font-weight: 600; font-size: 13px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 8px; }
        .key-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .key-btn { padding: 12px; border: 2px solid #cbd5e1; background: var(--white); border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--muted); }
        .key-btn.active { background: #f0f7ff; color: var(--primary); border-color: var(--primary); }
        input { width: 100%; padding: 16px; border: 2px solid #94a3b8; border-radius: 10px; font-size: 16px; font-weight: 700; }
        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
        #result-area { margin-top: 30px; border-top: 3px dashed #e2e8f0; padding-top: 25px; text-align: center; display: none; }
        #qrcode-res, #qrcode-apoio { display: flex; justify-content: center; margin: 20px 0; background: white; padding: 10px; }
        .copy-box { background: #f1f5f9; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; font-weight: 700; word-break: break-all; margin-bottom: 15px; border: 2px solid #cbd5e1; }
    </style>
</head>
<body>

<main class="container">
    <div class="lang-bar">
        <label for="lang-select" style="font-size: 10px; font-weight: 800; margin-right: 8px;">IDIOMA:</label>
        <select id="lang-select" onchange="updateLang(this.value)">
            <option value="pt">Português</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ln">Lingala</option>
        </select>
    </div>

    <nav class="tabs">
        <button class="tab-btn active" id="tab-gen" onclick="switchTab('gerador', this)">Gerador</button>
        <button class="tab-btn" id="tab-sup" onclick="switchTab('apoio', this)">Apoio</button>
    </nav>

    <div id="gerador" class="content active">
        <header><h1 id="txt-title">Paga Eu</h1><p id="txt-sub">Emissão de Cobrança Offline</p></header>
        <div class="form-group">
            <label id="txt-keytype">Tipo de Chave</label>
            <div class="key-selector">
                <button class="key-btn active" onclick="setKeyType('cpf', this)">CPF</button>
                <button class="key-btn" onclick="setKeyType('tel', this)">Celular</button>
                <button class="key-btn" onclick="setKeyType('email', this)">E-mail</button>
                <button class="key-btn" onclick="setKeyType('random', this)">Aleatória</button>
            </div>
            <input type="text" id="pix-key" placeholder="000.000.000-00">
        </div>
        <div class="form-group"><label id="txt-val">Valor</label><input type="tel" id="pix-amount" placeholder="R$ 0,00"></div>
        <div class="form-group"><label id="txt-rec">Nome do Recebedor</label><input type="text" id="pix-name" placeholder="EX: ANTONIO"></div>
        <button class="btn-main" id="btn-generate" onclick="generateAll()">Gerar QR Code</button>
        <div id="result-area" aria-live="polite">
            <div id="qrcode-res"></div>
            <div class="copy-box" id="pix-code-text" tabindex="0"></div>
            <button class="btn-main" id="btn-copy" style="background:var(--success)" onclick="copyCode()">Copiar Código</button>
        </div>
    </div>

    <div id="apoio" class="content">
        <header><h1 id="txt-supp-title">Apoio</h1></header>
        <div style="text-align:center;">
            <p id="txt-supp-msg" style="font-weight:800; color:var(--primary); font-size:18px;">"Pague quando puder, se puder."</p>
            <p id="txt-supp-sub" style="font-size:12px; margin:10px 0;">Sua doação ajuda a manter a ferramenta online.</p>
            <div id="qrcode-apoio"></div>
            <p style="font-size:10px; color:var(--muted); word-break:break-all;">52806ce2-7edb-4f89-9003-f8d199feb4f6</p>
        </div>
    </div>
</main>

<script>
    const i18n = {
        pt: { lang: "pt-BR", title: "Paga Eu", sub: "Emissão de Cobrança Offline", t_gen: "Gerador", t_sup: "Apoio", key: "Tipo de Chave", val: "Valor", rec: "Nome do Recebedor", b_gen: "Gerar QR Code", alert: "Preencha todos os campos." },
        fr: { lang: "fr", title: "Paye-Moi", sub: "Émission de Paiement Offline", t_gen: "Générateur", t_sup: "Soutien", key: "Type de Clé", val: "Montant", rec: "Bénéficiaire", b_gen: "Générer QR Code", alert: "Remplissez todos les campos." },
        es: { lang: "es", title: "Paga Yo", sub: "Emisión de Pago Offline", t_gen: "Generador", t_sup: "Apoyo", key: "Tipo de Clave", val: "Valor", rec: "Beneficiario", b_gen: "Generar QR Code", alert: "Complete todos os campos." },
        ln: { lang: "ln", title: "Futa Ngai", sub: "Kobimisa lifuta offline", t_gen: "Ebimiselo", t_sup: "Lisungi", key: "Ndenge ya fungola", val: "Motuya", rec: "Kombo ya moyambi", b_gen: "Bimisa QR Code", alert: "Tondisa bisika nionso." }
    };

    let curType = 'cpf';

    // CORREÇÃO: Função de troca de chave com limpeza automática do campo
    function setKeyType(t, b) {
        curType = t; 
        document.getElementById('pix-key').value = ""; // Limpa o campo ao trocar o tipo
        document.querySelectorAll('.key-btn').forEach(x => x.classList.remove('active')); 
        b.classList.add('active');
        
        // Ajusta o placeholder conforme o tipo
        const input = document.getElementById('pix-key');
        if(t==='cpf') input.placeholder = "000.000.000-00";
        else if(t==='tel') input.placeholder = "(00) 00000-0000";
        else if(t==='email') input.placeholder = "seu@email.com";
        else input.placeholder = "Chave Aleatória";
    }

    // PADRONIZAÇÃO DO NOME: Remove acentos, caracteres especiais e força Maiúsculas
    document.getElementById('pix-name').addEventListener('input', e => {
        let v = e.target.value;
        v = v.normalize("NFD").replace(/[\u0300-\u036f]/g, ""); // Remove acentos
        v = v.replace(/[^a-zA-Z\s]/g, ""); // Remove números e símbolos
        e.target.value = v.toUpperCase(); // Força Maiúsculas
    });

    // Máscara de Valor
    document.getElementById('pix-amount').addEventListener('input', e => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v/100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,").replace(/(\d)(\d{3}),/g, "$1.$2,");
        e.target.value = v ? "R$ " + v : "";
    });

    // Máscara de Chave
    document.getElementById('pix-key').addEventListener('input', e => {
        let v = e.target.value;
        if(curType==='cpf') v = v.replace(/\D/g, '').substring(0,11).replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        else if(curType==='tel') v = v.replace(/\D/g, '').substring(0,11).replace(/^(\d{2})(\d)/g, "($1) $2").replace(/(\d)(\d{4})$/, "$1-$2");
        e.target.value = v;
    });

    function switchTab(id, b) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(id).classList.add('active'); b.classList.add('active');
        if(id==='apoio' && !document.getElementById('qrcode-apoio').innerHTML) {
            const pay = genPay("52806ce2-7edb-4f89-9003-f8d199feb4f6", "5.00", "PAGA EU APOIO");
            new QRCode("qrcode-apoio", { text: pay, width: 180, height: 180, colorDark: "#002e8a" });
        }
    }

    function crc16(d) {
        let c = 0xFFFF;
        for(let i=0; i<d.length; i++) {
            c ^= d.charCodeAt(i) << 8;
            for(let j=0; j<8; j++) c = (c & 0x8000) ? (c << 1) ^ 0x1021 : (c << 1);
        }
        return (c & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
    }

    function fEMV(id, v) { return id + String(v).length.toString().padStart(2, '0') + v; }

    function genPay(k, a, n) {
        const me = fEMV("26", fEMV("00", "br.gov.bcb.pix") + fEMV("01", k));
        let p = "000201" + me + "520400005303986" + fEMV("54", parseFloat(a).toFixed(2)) + "5802BR" + fEMV("59", n.substring(0, 25)) + "6009SAO PAULO62070503***6304";
        return p + crc16(p);
    }

    function generateAll() {
        const a = document.getElementById('pix-amount').value.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
        let k = document.getElementById('pix-key').value.replace(/[.\-() ]/g, '');
        if(curType==='tel') k = '55' + k;
        const n = document.getElementById('pix-name').value;
        if(!k || !a || !n) return alert(i18n[document.getElementById('lang-select').value].alert);
        const code = genPay(k, a, n);
        document.getElementById('pix-code-text').innerText = code;
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('qrcode-res').innerHTML = "";
        new QRCode("qrcode-res", { text: code, width: 200, height: 200, colorDark: "#002e8a" });
    }

    function updateLang(l) {
        const t = i18n[l]; document.documentElement.lang = t.lang;
        document.getElementById('txt-title').innerText = t.title; document.getElementById('txt-sub').innerText = t.sub;
        document.getElementById('tab-gen').innerText = t.t_gen; document.getElementById('tab-sup').innerText = t.t_sup;
        document.getElementById('txt-keytype').innerText = t.key; document.getElementById('txt-val').innerText = t.val;
        document.getElementById('txt-rec').innerText = t.rec; document.getElementById('btn-generate').innerText = t.b_gen;
    }

    function copyCode() { navigator.clipboard.writeText(document.getElementById('pix-code-text').innerText); alert("Código Copiado!"); }
</script>
</body>
</html>
