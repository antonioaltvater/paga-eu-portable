<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paga Eu - Doom do Pix (Acessível)</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="qrcode.min.js"></script>
  <style>
        :root { 
            --primary: #002e8a; 
            --bg: #f8fafc; 
            --text: #0f172a; 
            --muted: #475569; /* Contraste Seguro > 4.5:1 */
            --white: #ffffff; 
            --focus: #2563eb; 
            --success: #166534;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        
        /* Foco de Acessibilidade Aprimorado */
        input:focus, button:focus, select:focus { outline: 3px solid var(--focus); outline-offset: 3px; }

        .container { background: var(--white); width: 100%; max-width: 420px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.12); border: 1px solid #e2e8f0; overflow: hidden; }
        
        .lang-bar { background: #f1f5f9; padding: 10px 15px; display: flex; justify-content: flex-end; border-bottom: 2px solid #e2e8f0; }
        #lang-select { border: 1px solid #cbd5e1; background: var(--white); font-size: 12px; font-weight: 700; padding: 4px; border-radius: 4px; color: var(--text); }
        
        .tabs { display: flex; background: #f1f5f9; padding: 6px; gap: 4px; }
        .tab-btn { flex: 1; padding: 14px; border: 2px solid transparent; background: none; font-size: 11px; font-weight: 800; cursor: pointer; color: var(--muted); border-radius: 10px; text-transform: uppercase; }
        .tab-btn[aria-selected="true"] { background: var(--white); color: var(--primary); border-color: var(--primary); }
        
        .content { padding: 30px; display: none; }
        .content.active { display: block; }
        
        header { text-align: center; margin-bottom: 25px; }
        header h1 { color: var(--primary); font-size: 24px; font-weight: 800; }
        header p { color: var(--muted); font-weight: 600; font-size: 13px; margin-top: 5px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 800; margin-bottom: 8px; color: var(--text); }
        
        .key-selector { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
        .key-btn { padding: 12px; border: 2px solid #cbd5e1; background: var(--white); border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; color: var(--muted); }
        .key-btn.active { background: #f0f7ff; color: var(--primary); border-color: var(--primary); }
        
        input { width: 100%; padding: 16px; border: 2px solid #94a3b8; border-radius: 10px; font-size: 16px; font-weight: 700; color: var(--text); }
        input::placeholder { color: #94a3b8; opacity: 1; }

        .btn-main { width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
        
        #result-area { margin-top: 30px; border-top: 3px dashed #e2e8f0; padding-top: 25px; text-align: center; display: none; }
        #qrcode-res, #qrcode-apoio { display: flex; justify-content: center; margin: 20px 0; background: white; padding: 10px; border-radius: 8px; border: 1px solid #eee; }
        
        .copy-box { background: #f1f5f9; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 11px; font-weight: 700; word-break: break-all; margin-bottom: 15px; border: 2px solid #cbd5e1; color: var(--text); }
        
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
    </style>
</head>
<body>

<main class="container">
    <div class="lang-bar">
        <label for="lang-select" style="font-size: 10px; font-weight: 800; margin-right: 8px; align-self: center;">IDIOMA:</label>
        <select id="lang-select" onchange="updateLang(this.value)">
            <option value="pt">Português</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
            <option value="ln">Lingala</option>
        </select>
    </div>

    <nav class="tabs" role="tablist">
        <button class="tab-btn active" id="tab-gen" role="tab" aria-selected="true" aria-controls="gerador" onclick="switchTab('gerador', this)">Gerador</button>
        <button class="tab-btn" id="tab-sup" role="tab" aria-selected="false" aria-controls="apoio" onclick="switchTab('apoio', this)">Apoio</button>
    </nav>

    <section id="gerador" class="content active" role="tabpanel" aria-labelledby="tab-gen">
        <header>
            <h1 id="txt-title">Paga Eu</h1>
            <p id="txt-sub">Emissão de Cobrança Offline</p>
        </header>

        <div class="form-group">
            <label id="txt-keytype">Tipo de Chave</label>
            <div class="key-selector" role="group">
                <button class="key-btn active" onclick="setKeyType('cpf', this)">CPF</button>
                <button class="key-btn" onclick="setKeyType('tel', this)">Celular</button>
                <button class="key-btn" onclick="setKeyType('email', this)">E-mail</button>
                <button class="key-btn" onclick="setKeyType('random', this)">Aleatória</button>
            </div>
            <input type="text" id="pix-key" placeholder="000.000.000-00" aria-required="true">
        </div>

        <div class="form-group">
            <label for="pix-amount" id="txt-val">Valor</label>
            <input type="tel" id="pix-amount" placeholder="R$ 0,00" aria-required="true">
        </div>

        <div class="form-group">
            <label for="pix-name" id="txt-rec">Nome do Recebedor</label>
            <input type="text" id="pix-name" placeholder="Ex: ANTONIO" aria-required="true">
        </div>

        <button class="btn-main" id="btn-generate" onclick="generateAll()">Gerar QR Code</button>

        <div id="result-area" aria-live="polite">
            <h2 id="txt-res-label" style="font-size: 14px; margin-bottom: 10px;">Código Gerado:</h2>
            <div id="qrcode-res" aria-label="QR Code para pagamento"></div>
            <div class="copy-box" id="pix-code-text" tabindex="0"></div>
            <button class="btn-main" id="btn-copy" style="background:var(--success)" onclick="copyCode()">Copiar Código</button>
        </div>
    </section>
      <section id="apoio" class="content" role="tabpanel" aria-labelledby="tab-sup">
        <header><h1 id="txt-supp-title">Apoio</h1></header>
        <div class="apoio-container">
            <p class="apoio-msg" id="txt-supp-msg">"Pague quando puder, se puder."</p>
            <p class="apoio-sub" id="txt-supp-sub">Sua doação ajuda a manter a ferramenta online.</p>
            <div id="qrcode-apoio" aria-label="QR Code de Apoio ao projeto"></div>
            <div style="font-size:10px; color:#94a3b8; word-break:break-all;" tabindex="0">52806ce2-7edb-4f89-9003-f8d199feb4f6</div>
        </div>
    </section>

    </main>

<script>
    const i18n = {
        pt: { lang: "pt-BR", title: "Paga Eu", sub: "Emissão de Cobrança Offline", t_gen: "Gerador", t_sup: "Apoio", key: "Tipo de Chave", val: "Valor", rec: "Nome do Recebedor", b_gen: "Gerar QR Code", s_msg: '"Pague quando puder, se puder."', s_sub: "Sua doação ajuda a manter a ferramenta pública.", b_copy: "Copiar Código", alert: "Preencha todos os campos.", qralt: "QR Code gerado com sucesso." },
        fr: { lang: "fr", title: "Paye-Moi", sub: "Émission de Paiement Offline", t_gen: "Générateur", t_sup: "Soutien", key: "Type de Clé", val: "Montant", rec: "Bénéficiaire", b_gen: "Générer QR Code", s_msg: '"Payez quand vous pouvez, si vous pouvez."', s_sub: "Votre don aide à maintenir cet outil public.", b_copy: "Copier le Code", alert: "Remplissez tous les champs.", qralt: "QR Code généré avec succès." },
        es: { lang: "es", title: "Paga Yo", sub: "Emisión de Pago Offline", t_gen: "Generador", t_sup: "Apoyo", key: "Tipo de Clave", val: "Valor", rec: "Beneficiario", b_gen: "Generar QR Code", s_msg: '"Paga cuando puedas, si puedes."', s_sub: "Tu donación ayuda a mantener esta herramienta pública.", b_copy: "Copiar Código", alert: "Complete todos los campos.", qralt: "QR Code generado con éxito." },
        ln: { lang: "ln", title: "Futa Ngai", sub: "Kobimisa lifuta offline", t_gen: "Ebimiselo", t_sup: "Lisungi", key: "Ndenge ya fungola", val: "Motuya", rec: "Kombo ya moyambi", b_gen: "Bimisa QR Code", s_msg: '"Futa tango okoki, soki okoki."', s_sub: "Lisungi na yo esalisaka biso kobatela mosala oyo.", b_copy: "Koma kode", alert: "Tondisa bisika nionso.", qralt: "QR Code ebimi malamu." }
    };

    function updateLang(l) {
        const t = i18n[l];
        document.documentElement.lang = t.lang; // Atualiza o idioma para o leitor de tela
        document.getElementById('txt-title').innerText = t.title;
        document.getElementById('txt-sub').innerText = t.sub;
        document.getElementById('tab-gen').innerText = t.t_gen;
        document.getElementById('tab-sup').innerText = t.t_sup;
        document.getElementById('txt-keytype').innerText = t.key;
        document.getElementById('txt-val').innerText = t.val;
        document.getElementById('txt-rec').innerText = t.rec;
        document.getElementById('btn-generate').innerText = t.b_gen;
        document.getElementById('txt-supp-title').innerText = t.t_sup;
        document.getElementById('txt-supp-msg').innerText = t.s_msg;
        document.getElementById('txt-supp-sub').innerText = t.s_sub;
        document.getElementById('btn-copy').innerText = t.b_copy;
    }

    // Lógica de Máscaras e Troca de Aba (com ARIA)
    function switchTab(id, b) {
        document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(x => {
            x.classList.remove('active');
            x.setAttribute('aria-selected', 'false');
        });
        document.getElementById(id).classList.add('active');
        b.classList.add('active');
        b.setAttribute('aria-selected', 'true');
        
        if(id==='apoio' && !document.getElementById('qrcode-apoio').innerHTML) {
            const pay = genPay("52806ce2-7edb-4f89-9003-f8d199feb4f6", "5.00", "PAGA EU APOIO");
            new QRCode("qrcode-apoio", { text: pay, width: 160, height: 160, colorDark: "#003399" });
        }
    }

    // ... (Manter funções crc16, genPay e máscaras do código anterior) ...

    function generateAll() {
        const a = document.getElementById('pix-amount').value.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
        let k = document.getElementById('pix-key').value.replace(/[.\-() ]/g, '');
        const n = document.getElementById('pix-name').value;
        const lang = document.getElementById('lang-select').value;

        if(!k || !a || !n) return alert(i18n[lang].alert);

        const code = genPay(k, a, n);
        document.getElementById('pix-code-text').innerText = code;
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('qrcode-res').innerHTML = "";
        new QRCode("qrcode-res", { text: code, width: 180, height: 180 });
        
        // Foco no resultado para facilitar a leitura assistiva
        document.getElementById('pix-code-text').focus();
    }

    function copyCode() {
        navigator.clipboard.writeText(document.getElementById('pix-code-text').innerText);
        alert("Pix Copiado!");
    }
</script>
</body>
</html>
